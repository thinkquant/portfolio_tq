name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build-api-image:
    name: Build and push API image
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://${{ vars.FIREBASE_SITE_ID }}.web.app
    env:
      API_IMAGE_TAG: gha-${{ github.sha }}
      API_IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/portfolio-tq-api/portfolio-tq-api:gha-${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t "$API_IMAGE_URI" .

      - name: Push API image
        run: docker push "$API_IMAGE_URI"

      - name: Publish workflow summary
        run: |
          {
            echo "## API image"
            echo "- Environment: dev"
            echo "- Image: \`$API_IMAGE_URI\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-api:
    name: Apply Terraform and deploy API
    runs-on: ubuntu-latest
    needs:
      - build-api-image
    environment:
      name: dev
      url: https://${{ vars.FIREBASE_SITE_ID }}.web.app
    env:
      API_IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/portfolio-tq-api/portfolio-tq-api:gha-${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir=infra/terraform/environments/dev init -input=false

      - name: Terraform plan
        run: |
          terraform -chdir=infra/terraform/environments/dev plan \
            -input=false \
            -no-color \
            -var "cloud_run_container_image=$API_IMAGE_URI" \
            -out=tfplan

      - name: Render Terraform plan
        run: terraform -chdir=infra/terraform/environments/dev show -no-color tfplan > terraform-apply-dev.txt

      - name: Upload Terraform apply plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-dev
          path: terraform-apply-dev.txt

      - name: Terraform apply
        run: terraform -chdir=infra/terraform/environments/dev apply -input=false -auto-approve tfplan

      - name: Publish workflow summary
        run: |
          {
            echo "## Terraform apply"
            echo "- Environment: dev"
            echo "- API image: \`$API_IMAGE_URI\`"
            echo "- Artifact: \`terraform-apply-dev\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-web:
    name: Deploy web app
    runs-on: ubuntu-latest
    needs:
      - build-api-image
    environment:
      name: dev
      url: https://${{ vars.FIREBASE_SITE_ID }}.web.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy web app
        run: pnpm deploy:web:dev

      - name: Publish workflow summary
        run: |
          {
            echo "## Web deploy"
            echo "- Environment: dev"
            echo "- Hosting URL: https://${{ vars.FIREBASE_SITE_ID }}.web.app"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: Run smoke checks
    runs-on: ubuntu-latest
    needs:
      - deploy-api
      - deploy-web
    environment:
      name: dev
      url: https://${{ vars.FIREBASE_SITE_ID }}.web.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke test web routes
        run: pnpm smoke:web:dev

      - name: Smoke test observability page
        run: pnpm smoke:observability:web:dev

      - name: Smoke test API endpoints
        run: pnpm smoke:api:dev

      - name: Smoke test Firestore-backed reads
        run: pnpm smoke:firestore:dev

      - name: Publish workflow summary
        run: |
          {
            echo "## Smoke checks"
            echo "- Environment: dev"
            echo "- Web routes, observability feed, API, and Firestore-backed reads passed."
          } >> "$GITHUB_STEP_SUMMARY"
